<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DompetKu 💰</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', 'Segoe UI', sans-serif; background: #0f1117; color: #f0f0f0; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0f1117; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 99px; }
    .btn-ghost { background: #ffffff08; border: 1px solid #ffffff10; color: #ccc; border-radius: 10px; padding: 7px 14px; font-size: 12px; cursor: pointer; font-family: inherit; transition: all 0.2s; font-weight: 700; }
    .btn-ghost:hover { background: #ffffff14; color: #fff; }
    .btn-sm { background: #ffffff08; border: 1px solid #ffffff10; color: #aaa; border-radius: 8px; padding: 4px 10px; font-size: 11px; cursor: pointer; font-family: inherit; font-weight: 700; margin-top: 4px; }
    .btn-sm:hover { background: #ffffff14; color: #fff; }
    .btn-primary { background: linear-gradient(135deg, #22c55e, #16a34a); border: none; color: #fff; border-radius: 14px; padding: 14px; font-size: 15px; font-weight: 800; cursor: pointer; font-family: inherit; transition: all 0.2s; letter-spacing: 0.3px; width: 100%; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-withdraw { background: linear-gradient(135deg, #f59e0b, #d97706); border: none; color: #fff; border-radius: 14px; padding: 14px; font-size: 15px; font-weight: 800; cursor: pointer; font-family: inherit; transition: all 0.2s; letter-spacing: 0.3px; width: 100%; }
    .btn-withdraw:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-danger { background: #ef4444; border: none; color: #fff; border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; flex: 1; }
    .btn-close { background: #ffffff08; border: none; color: #888; border-radius: 8px; width: 32px; height: 32px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
    .btn-close:hover { color: #fff; background: #ffffff14; }
    .btn-circle { background: #1a1f2e; border: 1.5px solid #ffffff10; color: #fff; border-radius: 50%; width: 38px; height: 38px; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .btn-circle:hover { background: #ffffff14; }
    .btn-del { background: none; border: none; color: #555; font-size: 16px; cursor: pointer; padding: 2px 6px; border-radius: 6px; display: block; margin-top: 3px; margin-left: auto; }
    .btn-del:hover { color: #ef4444; background: #ef444415; }
    .tab-btn { flex: 1; background: #ffffff06; border: 1.5px solid transparent; color: #888; border-radius: 12px; padding: 10px 4px; font-size: 11px; font-weight: 800; cursor: pointer; font-family: inherit; transition: all 0.2s; }
    .tab-btn.active { background: #1a1f2e; border-color: #ffffff15; color: #f0f0f0; }
    .tab-btn:hover:not(.active) { color: #ccc; background: #ffffff0a; }
    .cat-btn { background: #0f1117; border: 2px solid #ffffff0a; color: #999; border-radius: 12px; padding: 8px 4px; font-size: 13px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; transition: all 0.2s; font-family: inherit; }
    .cat-btn.selected { border-color: var(--cat-color); color: var(--cat-color); background: color-mix(in srgb, var(--cat-color) 10%, transparent); }
    .cat-btn:hover { border-color: var(--cat-color); }
    .exp-row { display: flex; align-items: center; gap: 12px; background: #1a1f2e; border: 1px solid #ffffff08; border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; transition: all 0.2s; }
    .exp-row:hover { border-color: #ffffff14; transform: translateY(-1px); }
    .withdraw-card { background: #1a1f2e; border: 1.5px solid #f59e0b30; border-radius: 16px; margin-bottom: 12px; overflow: hidden; transition: all 0.2s; }
    .withdraw-card:hover { border-color: #f59e0b55; }
    .withdraw-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; cursor: pointer; user-select: none; }
    .withdraw-body { padding: 0 16px 14px; border-top: 1px solid #ffffff08; }
    .fab { position: fixed; bottom: 28px; right: 24px; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #22c55e, #16a34a); border: none; color: #fff; font-size: 30px; font-weight: 300; cursor: pointer; box-shadow: 0 8px 24px #22c55e40; transition: all 0.2s; z-index: 400; display: flex; align-items: center; justify-content: center; }
    .fab:hover { transform: scale(1.08); box-shadow: 0 12px 32px #22c55e55; }
    .progress-anim { transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .modal-anim { animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.7); }
    input:focus { border-color: #22c55e !important; outline: none; }
    .app-input { width: 100%; background: #0f1117; border: 1.5px solid #ffffff12; border-radius: 12px; padding: 11px 14px; color: #f0f0f0; font-size: 15px; outline: none; box-sizing: border-box; transition: border-color 0.2s; font-family: inherit; }
    .badge-sisa { display: inline-block; background: #22c55e18; color: #22c55e; border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 700; }
    .badge-habis { display: inline-block; background: #ef444418; color: #ef4444; border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 700; }
    .withdraw-exp-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #ffffff06; }
    .withdraw-exp-row:last-child { border-bottom: none; }
    .add-exp-btn { background: #f59e0b18; border: 1.5px dashed #f59e0b44; color: #f59e0b; border-radius: 10px; padding: 8px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; width: 100%; margin-top: 10px; transition: all 0.2s; }
    .add-exp-btn:hover { background: #f59e0b25; border-color: #f59e0b88; }
    .tarik-btn-bar { display: flex; justify-content: flex-end; margin-bottom: 14px; }
    .btn-tarik-new { background: linear-gradient(135deg,#f59e0b,#d97706); border: none; color: #fff; border-radius: 12px; padding: 10px 18px; font-size: 13px; font-weight: 800; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 16px #f59e0b30; transition: all 0.2s; }
    .btn-tarik-new:hover { opacity: 0.9; transform: translateY(-1px); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const STORAGE_KEY = "dompetku-data-v3";
    const MONTHS_ID = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
    const DAYS_ID = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
    const CATEGORIES = [
      { id: "makan",      label: "🍜 Makan & Minum",  color: "#f97316" },
      { id: "transport",  label: "🚗 Transportasi",    color: "#3b82f6" },
      { id: "belanja",    label: "🛒 Belanja",          color: "#a855f7" },
      { id: "tagihan",    label: "💡 Tagihan",           color: "#ef4444" },
      { id: "hiburan",    label: "🎮 Hiburan",           color: "#22c55e" },
      { id: "kesehatan",  label: "💊 Kesehatan",         color: "#06b6d4" },
      { id: "pendidikan", label: "📚 Pendidikan",        color: "#f59e0b" },
      { id: "lainnya",    label: "📦 Lainnya",           color: "#6b7280" },
    ];
    const getCatColor = id => CATEGORIES.find(c => c.id === id)?.color || "#6b7280";
    const getCatLabel = id => CATEGORIES.find(c => c.id === id)?.label || id;
    const monthKey   = (y, m) => `${y}-${String(m).padStart(2,"0")}`;
    const fmtRp      = n => "Rp " + Number(n).toLocaleString("id-ID");
    const todayIso   = () => new Date().toISOString().slice(0,10);
    const fmtDateFull  = s => { const d = new Date(s+"T00:00:00"); return `${DAYS_ID[d.getDay()]}, ${d.getDate()} ${MONTHS_ID[d.getMonth()]} ${d.getFullYear()}`; };
    const fmtDateShort = s => { const d = new Date(s+"T00:00:00"); return `${DAYS_ID[d.getDay()]}, ${d.getDate()} ${MONTHS_ID[d.getMonth()]}`; };

    /* ───── ExpRow ───── */
    function ExpRow({ e, onDelete }) {
      const color = getCatColor(e.category);
      const label = getCatLabel(e.category);
      return (
        <div className="exp-row">
          <div style={{ width:36,height:36,borderRadius:10,background:color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0 }}>
            {label.split(" ")[0]}
          </div>
          <div style={{ flex:1,minWidth:0 }}>
            <div style={{ fontWeight:600,fontSize:14,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis" }}>{e.desc}</div>
            <div style={{ fontSize:12,color:"#666",marginTop:2 }}>{label.slice(3)} · {fmtDateShort(e.date)}</div>
          </div>
          <div style={{ textAlign:"right" }}>
            <div style={{ fontWeight:800,fontSize:14,color }}>{fmtRp(e.amount)}</div>
            <button className="btn-del" onClick={() => onDelete(e.id)}>×</button>
          </div>
        </div>
      );
    }

    /* ───── Modal ───── */
    function Modal({ title, onClose, children }) {
      return (
        <div style={{ position:"fixed",inset:0,background:"#000000cc",backdropFilter:"blur(8px)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:1000,padding:16 }}
          onClick={ev => ev.target===ev.currentTarget && onClose()}>
          <div className="modal-anim" style={{ background:"#1a1f2e",border:"1.5px solid #ffffff12",borderRadius:"24px 24px 20px 20px",padding:24,width:"100%",maxWidth:500,maxHeight:"90vh",overflowY:"auto" }}>
            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20 }}>
              <div style={{ fontWeight:800,fontSize:18 }}>{title}</div>
              <button className="btn-close" onClick={onClose}>×</button>
            </div>
            {children}
          </div>
        </div>
      );
    }

    /* ───── ExpenseForm (reusable) ───── */
    function ExpenseForm({ form, setForm, onSubmit, btnLabel, btnClass="btn-primary" }) {
      return (
        <>
          <div style={{ marginBottom:16 }}>
            <label style={{ display:"block",fontSize:12,color:"#888",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6 }}>Keterangan</label>
            <input className="app-input" placeholder="Makan siang, bensin, dll..." value={form.desc}
              onChange={e => setForm(f=>({...f,desc:e.target.value}))} autoFocus />
          </div>
          <div style={{ marginBottom:16 }}>
            <label style={{ display:"block",fontSize:12,color:"#888",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6 }}>Jumlah (Rp)</label>
            <input className="app-input" type="text" placeholder="Contoh: 25000" value={form.amount}
              onChange={e => setForm(f=>({...f,amount:e.target.value.replace(/\D/g,"")}))} />
            {form.amount && <div style={{ fontSize:13,color:"#22c55e",marginTop:5,fontWeight:700 }}>{fmtRp(form.amount)}</div>}
          </div>
          <div style={{ marginBottom:16 }}>
            <label style={{ display:"block",fontSize:12,color:"#888",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6 }}>Kategori</label>
            <div style={{ display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8 }}>
              {CATEGORIES.map(cat => (
                <button key={cat.id} className={`cat-btn${form.category===cat.id?" selected":""}`}
                  style={{"--cat-color":cat.color}} onClick={() => setForm(f=>({...f,category:cat.id}))}>
                  <span>{cat.label.split(" ")[0]}</span>
                  <span style={{ fontSize:10 }}>{cat.label.slice(3)}</span>
                </button>
              ))}
            </div>
          </div>
          <div style={{ marginBottom:16 }}>
            <label style={{ display:"block",fontSize:12,color:"#888",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6 }}>Tanggal</label>
            <input className="app-input" type="date" value={form.date}
              onChange={e => setForm(f=>({...f,date:e.target.value}))} />
            {form.date && <div style={{ fontSize:12,color:"#888",marginTop:4 }}>{fmtDateFull(form.date)}</div>}
          </div>
          <button className={btnClass} onClick={onSubmit}>{btnLabel}</button>
        </>
      );
    }

    /* ───── WithdrawCard ───── */
    function WithdrawCard({ w, onAddExpense, onDeleteWithdraw, onDeleteWithdrawExp }) {
      const [open, setOpen] = useState(false);
      const totalSpent = w.expenses.reduce((s,e) => s+e.amount, 0);
      const sisa = w.amount - totalSpent;
      const pct  = w.amount > 0 ? Math.min((totalSpent/w.amount)*100, 100) : 0;

      return (
        <div className="withdraw-card">
          <div className="withdraw-header" onClick={() => setOpen(o=>!o)}>
            <div style={{ display:"flex",alignItems:"center",gap:12 }}>
              <div style={{ width:40,height:40,borderRadius:12,background:"linear-gradient(135deg,#f59e0b,#d97706)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20 }}>💵</div>
              <div>
                <div style={{ fontWeight:700,fontSize:14 }}>{w.label || "Tarik Tunai"}</div>
                <div style={{ fontSize:12,color:"#888",marginTop:1 }}>{fmtDateFull(w.date)}</div>
              </div>
            </div>
            <div style={{ textAlign:"right" }}>
              <div style={{ fontWeight:800,fontSize:14,color:"#f59e0b" }}>{fmtRp(w.amount)}</div>
              <div style={{ marginTop:3 }}>
                {sisa <= 0
                  ? <span className="badge-habis">Habis</span>
                  : <span className="badge-sisa">Sisa {fmtRp(sisa)}</span>}
              </div>
            </div>
          </div>

          {open && (
            <div className="withdraw-body">
              <div style={{ marginBottom:12 }}>
                <div style={{ display:"flex",justifyContent:"space-between",fontSize:11,color:"#888",marginBottom:4 }}>
                  <span>Dipakai: {fmtRp(totalSpent)}</span>
                  <span>{pct.toFixed(0)}%</span>
                </div>
                <div style={{ height:5,background:"#ffffff0a",borderRadius:99,overflow:"hidden" }}>
                  <div className="progress-anim" style={{ height:"100%",borderRadius:99,width:`${pct}%`,background:pct>=90?"#ef4444":"#f59e0b" }} />
                </div>
              </div>

              {w.expenses.length === 0
                ? <div style={{ textAlign:"center",color:"#555",padding:"12px 0",fontSize:13 }}>Belum ada pengeluaran dari uang ini.</div>
                : w.expenses.map(e => (
                  <div key={e.id} className="withdraw-exp-row">
                    <div style={{ display:"flex",alignItems:"center",gap:10 }}>
                      <div style={{ width:30,height:30,borderRadius:8,background:getCatColor(e.category),display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0 }}>
                        {getCatLabel(e.category).split(" ")[0]}
                      </div>
                      <div>
                        <div style={{ fontWeight:600,fontSize:13 }}>{e.desc}</div>
                        <div style={{ fontSize:11,color:"#666" }}>{fmtDateShort(e.date)} · {getCatLabel(e.category).slice(3)}</div>
                      </div>
                    </div>
                    <div style={{ textAlign:"right",flexShrink:0 }}>
                      <div style={{ fontWeight:700,fontSize:13,color:getCatColor(e.category) }}>{fmtRp(e.amount)}</div>
                      <button className="btn-del" style={{ fontSize:13 }} onClick={() => onDeleteWithdrawExp(w.id, e.id)}>×</button>
                    </div>
                  </div>
                ))
              }

              <button className="add-exp-btn" onClick={() => onAddExpense(w.id)}>
                + Tambah Pengeluaran dari Uang Ini
              </button>
              <div style={{ marginTop:10,display:"flex",justifyContent:"flex-end" }}>
                <button onClick={() => onDeleteWithdraw(w.id)} style={{ background:"none",border:"none",color:"#ef444488",fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:700 }}>
                  🗑 Hapus Penarikan
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ───── App ───── */
    function App() {
      const now = new Date();
      const [tab, setTab] = useState("dashboard");
      const [yr,  setYr]  = useState(now.getFullYear());
      const [mo,  setMo]  = useState(now.getMonth() + 1);

      const [data, setData] = useState(() => {
        try {
          const s = localStorage.getItem(STORAGE_KEY);
          if (s) { const p=JSON.parse(s); if(!p.withdrawals) p.withdrawals=[]; return p; }
        } catch {}
        return { budgets:{}, expenses:[], withdrawals:[] };
      });

      const [budgetInput,   setBudgetInput]   = useState("");
      const [showBudget,    setShowBudget]    = useState(false);
      const [showExp,       setShowExp]       = useState(false);
      const [showWithdraw,  setShowWithdraw]  = useState(false);
      const [showWExp,      setShowWExp]      = useState(null);   // withdrawId for sub-expense modal
      const [deleteId,      setDeleteId]      = useState(null);
      const [deleteWId,     setDeleteWId]     = useState(null);
      const [showReset,     setShowReset]     = useState(false);

      const blankExp  = () => ({ desc:"", amount:"", category:"makan", date:todayIso() });
      const [expForm,  setExpForm]  = useState(blankExp);
      const [wdForm,   setWdForm]   = useState({ label:"", amount:"", date:todayIso() });
      const [wExpForm, setWExpForm] = useState(blankExp);

      useEffect(() => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {} }, [data]);

      const mk = monthKey(yr, mo);
      const budget      = data.budgets[mk] || 0;
      const expenses    = data.expenses.filter(e => e.monthKey === mk);
      const withdrawals = (data.withdrawals||[]).filter(w => w.monthKey === mk);

      const totalWithdrawn       = withdrawals.reduce((s,w) => s+w.amount, 0);
      const totalExpDirect       = expenses.reduce((s,e) => s+e.amount, 0);
      const totalExpFromWithdraw = withdrawals.reduce((s,w) => s+w.expenses.reduce((ss,e)=>ss+e.amount,0), 0);
      const totalSpent           = totalExpDirect + totalExpFromWithdraw;
      // Pengeluaran langsung JUGA ngurangin saldo tarik uang
      const totalUsedFromCash    = totalExpDirect + totalExpFromWithdraw;
      const sisaTunai            = Math.max(0, totalWithdrawn - totalUsedFromCash);
      const remaining            = budget - totalWithdrawn - totalExpDirect;
      const pct                  = budget>0 ? Math.min(((totalWithdrawn+totalExpDirect)/budget)*100,100) : 0;
      const barColor             = pct>=90?"#ef4444":pct>=70?"#f97316":"#22c55e";

      /* Statistik: gabungkan direct + withdraw sub-expenses */
      const catBreakdown = CATEGORIES.map(cat => {
        const fromDirect   = expenses.filter(e=>e.category===cat.id).reduce((s,e)=>s+e.amount,0);
        const fromWithdraw = withdrawals.reduce((s,w)=>s+w.expenses.filter(e=>e.category===cat.id).reduce((ss,e)=>ss+e.amount,0),0);
        const total = fromDirect + fromWithdraw;
        const count = expenses.filter(e=>e.category===cat.id).length
                    + withdrawals.reduce((s,w)=>s+w.expenses.filter(e=>e.category===cat.id).length,0);
        return { ...cat, total, count };
      }).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);

      const topCat    = catBreakdown[0] || null;
      const sortedExp = [...expenses].sort((a,b)=>new Date(b.date)-new Date(a.date));
      const sortedW   = [...withdrawals].sort((a,b)=>new Date(b.date)-new Date(a.date));

      const prevMonth = () => { if(mo===1){setYr(y=>y-1);setMo(12);}else setMo(m=>m-1); };
      const nextMonth = () => { if(mo===12){setYr(y=>y+1);setMo(1);}else setMo(m=>m+1); };

      const saveBudget = () => {
        const val = parseInt(budgetInput.replace(/\D/g,""));
        if(!val||val<=0) return;
        setData(d=>({...d,budgets:{...d.budgets,[mk]:val}}));
        setBudgetInput(""); setShowBudget(false);
      };

      const addExpense = () => {
        const amt = parseInt(expForm.amount.replace(/\D/g,""));
        if(!expForm.desc.trim()||!amt||amt<=0) return;
        setData(d=>({...d,expenses:[{id:Date.now(),monthKey:mk,desc:expForm.desc.trim(),amount:amt,category:expForm.category,date:expForm.date},...d.expenses]}));
        setExpForm(blankExp()); setShowExp(false);
      };

      const addWithdraw = () => {
        const amt = parseInt(wdForm.amount.replace(/\D/g,""));
        if(!amt||amt<=0) return;
        const nw = { id:Date.now(), monthKey:mk, label:wdForm.label.trim()||"Tarik Tunai", amount:amt, date:wdForm.date, expenses:[] };
        setData(d=>({...d,withdrawals:[nw,...(d.withdrawals||[])]}));
        setWdForm({label:"",amount:"",date:todayIso()}); setShowWithdraw(false);
      };

      const addWExpense = () => {
        const amt = parseInt(wExpForm.amount.replace(/\D/g,""));
        if(!wExpForm.desc.trim()||!amt||amt<=0) return;
        const ne = { id:Date.now(), desc:wExpForm.desc.trim(), amount:amt, category:wExpForm.category, date:wExpForm.date };
        setData(d=>({...d,withdrawals:(d.withdrawals||[]).map(w=>w.id===showWExp?{...w,expenses:[...w.expenses,ne]}:w)}));
        setWExpForm(blankExp()); setShowWExp(null);
      };

      const deleteExpense  = id => { setData(d=>({...d,expenses:d.expenses.filter(e=>e.id!==id)})); setDeleteId(null); };
      const deleteWithdraw = id => { setData(d=>({...d,withdrawals:(d.withdrawals||[]).filter(w=>w.id!==id)})); setDeleteWId(null); };
      const deleteWExp     = (wId,eId) => setData(d=>({...d,withdrawals:(d.withdrawals||[]).map(w=>w.id===wId?{...w,expenses:w.expenses.filter(e=>e.id!==eId)}:w)}));

      const exportData = () => {
        const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
        const url=URL.createObjectURL(blob);
        const a=document.createElement("a");a.href=url;a.download=`dompetku-${mk}.json`;a.click();URL.revokeObjectURL(url);
      };
      const resetData = () => {
        setData({ budgets:{}, expenses:[], withdrawals:[] });
        try { localStorage.removeItem(STORAGE_KEY); } catch {}
        setShowReset(false);
      };

      const importData = ev => {
        const file=ev.target.files[0];if(!file)return;
        const r=new FileReader();
        r.onload=e=>{ try{const p=JSON.parse(e.target.result);if(p.expenses&&p.budgets){if(!p.withdrawals)p.withdrawals=[];setData(p);}}catch{} };
        r.readAsText(file);ev.target.value="";
      };

      /* helper: find withdraw for showWExp */
      const activeW = showWExp ? (data.withdrawals||[]).find(w=>w.id===showWExp) : null;

      return (
        <div style={{ minHeight:"100vh",background:"#0f1117",color:"#f0f0f0",fontFamily:"'Nunito',sans-serif",paddingBottom:100 }}>

          {/* Header */}
          <header style={{ background:"linear-gradient(135deg,#1a1f2e,#0f1117)",borderBottom:"1px solid #ffffff0f",padding:"16px 20px",position:"sticky",top:0,zIndex:100 }}>
            <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",maxWidth:640,margin:"0 auto" }}>
              <div style={{ display:"flex",alignItems:"center",gap:12 }}>
                <span style={{ fontSize:32 }}>💰</span>
                <div>
                  <div style={{ fontWeight:800,fontSize:18,letterSpacing:-0.5 }}>DompetKu</div>
                  <div style={{ fontSize:11,color:"#888" }}>Pencatat Keuangan Pribadi</div>
                </div>
              </div>
              <div style={{ display:"flex",gap:8 }}>
                <button className="btn-ghost" onClick={exportData}>⬇ Export</button>
                <label className="btn-ghost" style={{ cursor:"pointer" }}>⬆ Import<input type="file" accept=".json" style={{ display:"none" }} onChange={importData}/></label>
                <button className="btn-ghost" style={{color:"#ef4444",borderColor:"#ef444430"}} onClick={()=>setShowReset(true)}>🗑 Reset</button>
              </div>
            </div>
          </header>

          {/* Month nav */}
          <div style={{ display:"flex",alignItems:"center",justifyContent:"center",gap:20,padding:"20px 20px 10px",maxWidth:640,margin:"0 auto" }}>
            <button className="btn-circle" onClick={prevMonth}>‹</button>
            <div style={{ display:"flex",flexDirection:"column",alignItems:"center" }}>
              <span style={{ fontWeight:800,fontSize:22,letterSpacing:-0.5 }}>{MONTHS_ID[mo-1]}</span>
              <span style={{ fontSize:13,color:"#888" }}>{yr}</span>
            </div>
            <button className="btn-circle" onClick={nextMonth}>›</button>
          </div>

          {/* Summary cards */}
          <div style={{ display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,padding:"0 16px",maxWidth:640,margin:"10px auto 0" }}>
            {/* Anggaran */}
            <div style={{ background:"#1a1f2e",border:"1.5px solid #22c55e22",borderRadius:16,padding:"14px 12px",display:"flex",flexDirection:"column",gap:4 }}>
              <div style={{ fontSize:10,color:"#888",fontWeight:600,textTransform:"uppercase",letterSpacing:0.5 }}>Anggaran</div>
              <div style={{ fontWeight:800,fontSize:14,color:"#22c55e",lineHeight:1.2 }}>{budget>0?fmtRp(budget):"—"}</div>
              <button className="btn-sm" onClick={()=>{setBudgetInput(budget?String(budget):"");setShowBudget(true);}}>{budget>0?"Ubah":"Set"}</button>
            </div>

            {/* Tarik Uang — expanded */}
            <div style={{ background:"#1a1f2e",border:"1.5px solid #f59e0b33",borderRadius:16,padding:"14px 12px",display:"flex",flexDirection:"column",gap:5 }}>
              <div style={{ fontSize:10,color:"#888",fontWeight:600,textTransform:"uppercase",letterSpacing:0.5 }}>💵 Tarik Uang</div>
              <div style={{ fontWeight:800,fontSize:14,color:"#f59e0b",lineHeight:1.2 }}>{totalWithdrawn>0?fmtRp(totalWithdrawn):"—"}</div>
              {totalWithdrawn>0 && (
                <>
                  <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:2 }}>
                    <span style={{ fontSize:10,color:"#888" }}>Sudah dipakai</span>
                    <span style={{ fontSize:11,fontWeight:700,color:"#ef4444" }}>{fmtRp(totalUsedFromCash)}</span>
                  </div>
                  <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
                    <span style={{ fontSize:10,color:"#888" }}>Sisa tunai</span>
                    <span style={{ fontSize:11,fontWeight:700,color: sisaTunai<=0?"#ef4444":"#22c55e" }}>
                      {fmtRp(sisaTunai)}
                    </span>
                  </div>
                  <div style={{ height:3,background:"#ffffff0a",borderRadius:99,overflow:"hidden",marginTop:2 }}>
                    <div className="progress-anim" style={{ height:"100%",borderRadius:99,background:"#ef4444",
                      width:`${totalWithdrawn>0?Math.min((totalUsedFromCash/totalWithdrawn)*100,100):0}%` }} />
                  </div>
                </>
              )}
              {totalWithdrawn===0 && <div style={{fontSize:11,color:"#555"}}>{withdrawals.length} penarikan</div>}
            </div>

            {/* Total Pengeluaran */}
            <div style={{ background:"#1a1f2e",border:"1.5px solid #ef444422",borderRadius:16,padding:"14px 12px",display:"flex",flexDirection:"column",gap:4 }}>
              <div style={{ fontSize:10,color:"#888",fontWeight:600,textTransform:"uppercase",letterSpacing:0.5 }}>Total Pengeluaran</div>
              <div style={{ fontWeight:800,fontSize:14,color:"#ef4444",lineHeight:1.2 }}>{fmtRp(totalSpent)}</div>
              {totalExpDirect>0&&totalExpFromWithdraw>0 ? (
                <>
                  <div style={{ fontSize:10,color:"#666" }}>Langsung: {fmtRp(totalExpDirect)}</div>
                  <div style={{ fontSize:10,color:"#666" }}>Dari tunai: {fmtRp(totalExpFromWithdraw)}</div>
                </>
              ) : (
                <div style={{fontSize:11,color:"#666"}}>{expenses.length+withdrawals.reduce((s,w)=>s+w.expenses.length,0)} transaksi</div>
              )}
            </div>

            {/* Sisa Anggaran */}
            <div style={{ background:"#1a1f2e",border:`1.5px solid ${remaining<0?"#ef444422":"#3b82f622"}`,borderRadius:16,padding:"14px 12px",display:"flex",flexDirection:"column",gap:4 }}>
              <div style={{ fontSize:10,color:"#888",fontWeight:600,textTransform:"uppercase",letterSpacing:0.5 }}>Sisa Anggaran</div>
              <div style={{ fontWeight:800,fontSize:14,color:remaining<0?"#ef4444":"#3b82f6",lineHeight:1.2 }}>{budget>0?fmtRp(remaining):"—"}</div>
              {remaining<0?<div style={{color:"#ef4444",fontSize:11}}>⚠ Over!</div>:null}
            </div>
          </div>

          {/* Progress bar */}
          {budget>0 && (
            <div style={{ maxWidth:640,margin:"16px auto 0",padding:"0 16px" }}>
              <div style={{ height:8,background:"#ffffff10",borderRadius:99,overflow:"hidden" }}>
                <div className="progress-anim" style={{ height:"100%",borderRadius:99,width:`${pct}%`,background:barColor }} />
              </div>
              <div style={{ fontSize:11,color:"#888",marginTop:5,textAlign:"right" }}>{pct.toFixed(1)}% anggaran digunakan</div>
            </div>
          )}

          {/* Tabs */}
          <div style={{ display:"flex",gap:4,padding:"16px 16px 0",maxWidth:640,margin:"0 auto" }}>
            {[["dashboard","🏠 Ringkasan"],["tarik","💵 Tarik Uang"],["pengeluaran","📋 Transaksi"],["statistik","📊 Statistik"]].map(([id,lbl])=>(
              <button key={id} className={`tab-btn${tab===id?" active":""}`} onClick={()=>setTab(id)}>{lbl}</button>
            ))}
          </div>

          {/* ─── Main content ─── */}
          <main style={{ maxWidth:640,margin:"0 auto",padding:16 }}>

            {/* ── DASHBOARD ── */}
            {tab==="dashboard" && (
              <div>
                {topCat && (
                  <div style={{ background:"linear-gradient(135deg,#1a1f2e,#12161f)",border:"1.5px solid #ffffff10",borderRadius:20,padding:18,marginBottom:20 }}>
                    <div style={{ fontSize:11,color:"#f59e0b",fontWeight:700,textTransform:"uppercase",letterSpacing:1 }}>🏆 Pengeluaran Terbesar</div>
                    <div style={{ display:"flex",alignItems:"center",gap:12,marginTop:10 }}>
                      <div style={{ width:42,height:42,borderRadius:12,background:topCat.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20 }}>{topCat.label.split(" ")[0]}</div>
                      <div>
                        <div style={{ fontWeight:700,fontSize:15 }}>{topCat.label.slice(3)}</div>
                        <div style={{ color:topCat.color,fontWeight:800,fontSize:18 }}>{fmtRp(topCat.total)}</div>
                        {budget>0 && <div style={{ fontSize:12,color:"#888" }}>{((topCat.total/budget)*100).toFixed(1)}% dari anggaran</div>}
                      </div>
                    </div>
                  </div>
                )}

                {sortedW.length>0 && (
                  <div style={{ background:"#1a1f2e",border:"1.5px solid #f59e0b22",borderRadius:16,padding:16,marginBottom:16 }}>
                    <div style={{ fontWeight:800,fontSize:13,color:"#f59e0b",marginBottom:10 }}>💵 Uang Tunai Ditarik</div>
                    {sortedW.slice(0,3).map(w=>{
                      const spent=w.expenses.reduce((s,e)=>s+e.amount,0);
                      const sisa=w.amount-spent;
                      return (
                        <div key={w.id} style={{ display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #ffffff06" }}>
                          <div>
                            <div style={{ fontWeight:600,fontSize:13 }}>{w.label}</div>
                            <div style={{ fontSize:11,color:"#888" }}>{fmtDateShort(w.date)}</div>
                          </div>
                          <div style={{ textAlign:"right" }}>
                            <div style={{ fontSize:13,fontWeight:700,color:"#f59e0b" }}>{fmtRp(w.amount)}</div>
                            <div style={{ fontSize:11,color:sisa<=0?"#ef4444":"#22c55e" }}>{sisa<=0?"Habis":"Sisa "+fmtRp(sisa)}</div>
                          </div>
                        </div>
                      );
                    })}
                    {sortedW.length>3 && <button className="btn-ghost" style={{ width:"100%",marginTop:8 }} onClick={()=>setTab("tarik")}>Lihat semua →</button>}
                  </div>
                )}

                <div style={{ fontWeight:800,fontSize:14,color:"#888",textTransform:"uppercase",letterSpacing:1,marginBottom:12 }}>Transaksi Langsung Terbaru</div>
                {sortedExp.slice(0,5).length===0
                  ? <div style={{ textAlign:"center",color:"#555",padding:"28px 0",lineHeight:1.8 }}>Belum ada pengeluaran langsung.<br/>Tekan + untuk tambah transaksi! ✨</div>
                  : sortedExp.slice(0,5).map(e=><ExpRow key={e.id} e={e} onDelete={setDeleteId}/>)
                }
                {sortedExp.length>5 && <button className="btn-ghost" style={{ width:"100%",marginTop:8 }} onClick={()=>setTab("pengeluaran")}>Lihat semua {sortedExp.length} transaksi →</button>}
              </div>
            )}

            {/* ── TARIK UANG ── */}
            {tab==="tarik" && (
              <div>
                {/* Tombol Tarik Baru di dalam konten */}
                <div className="tarik-btn-bar">
                  <button className="btn-tarik-new" onClick={()=>setShowWithdraw(true)}>💵 Tarik Uang Baru</button>
                </div>

                {withdrawals.length>0 && (
                  <div style={{ background:"#1a1f2e",border:"1.5px solid #f59e0b22",borderRadius:14,padding:"12px 16px",marginBottom:14,display:"flex",justifyContent:"space-around" }}>
                    <div style={{ textAlign:"center" }}>
                      <div style={{ fontSize:11,color:"#888" }}>Total Ditarik</div>
                      <div style={{ fontWeight:800,color:"#f59e0b" }}>{fmtRp(totalWithdrawn)}</div>
                    </div>
                    <div style={{ textAlign:"center" }}>
                      <div style={{ fontSize:11,color:"#888" }}>Sudah Dipakai</div>
                      <div style={{ fontWeight:800,color:"#ef4444" }}>{fmtRp(totalUsedFromCash)}</div>
                    </div>
                    <div style={{ textAlign:"center" }}>
                      <div style={{ fontSize:11,color:"#888" }}>Sisa Tunai</div>
                      <div style={{ fontWeight:800,color: sisaTunai<=0?"#ef4444":"#22c55e" }}>{fmtRp(sisaTunai)}</div>
                    </div>
                  </div>
                )}

                <div style={{ fontWeight:800,fontSize:14,color:"#888",textTransform:"uppercase",letterSpacing:1,marginBottom:12 }}>Riwayat Penarikan</div>

                {sortedW.length===0
                  ? <div style={{ textAlign:"center",color:"#555",padding:"40px 0",lineHeight:1.8 }}>
                      Belum ada penarikan bulan ini.<br/>
                      <span style={{ fontSize:13 }}>Tekan "Tarik Uang Baru" di atas.</span>
                    </div>
                  : sortedW.map(w=>(
                    <WithdrawCard key={w.id} w={w}
                      onAddExpense={id=>{ setShowWExp(id); setWExpForm(blankExp()); }}
                      onDeleteWithdraw={id=>setDeleteWId(id)}
                      onDeleteWithdrawExp={deleteWExp}
                    />
                  ))
                }
              </div>
            )}

            {/* ── TRANSAKSI ── */}
            {tab==="pengeluaran" && (
              <div>
                <div style={{ fontWeight:800,fontSize:14,color:"#888",textTransform:"uppercase",letterSpacing:1,marginBottom:12 }}>Semua Transaksi Langsung</div>
                {sortedExp.length===0
                  ? <div style={{ textAlign:"center",color:"#555",padding:"40px 0" }}>Belum ada pengeluaran langsung bulan ini.</div>
                  : sortedExp.map(e=><ExpRow key={e.id} e={e} onDelete={setDeleteId}/>)
                }
              </div>
            )}

            {/* ── STATISTIK ── */}
            {tab==="statistik" && (
              <div>
                {/* ── Breakdown Kategori ── */}
                <div style={{ fontWeight:800,fontSize:14,color:"#888",textTransform:"uppercase",letterSpacing:1,marginBottom:4 }}>Breakdown Kategori</div>
                <div style={{ fontSize:12,color:"#555",marginBottom:14 }}>Mencakup transaksi langsung + pengeluaran dari tarik uang</div>

                {catBreakdown.length===0
                  ? <div style={{ textAlign:"center",color:"#555",padding:"40px 0" }}>Belum ada data statistik bulan ini.</div>
                  : catBreakdown.map(cat=>(
                    <div key={cat.id} style={{ background:"#1a1f2e",border:"1px solid #ffffff08",borderRadius:14,padding:"12px 14px",marginBottom:8 }}>
                      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8 }}>
                        <div style={{ display:"flex",alignItems:"center",gap:10 }}>
                          <span style={{ fontSize:20 }}>{cat.label.split(" ")[0]}</span>
                          <div>
                            <div style={{ fontWeight:600,fontSize:14 }}>{cat.label.slice(3)}</div>
                            <div style={{ fontSize:12,color:"#888" }}>{cat.count} transaksi</div>
                          </div>
                        </div>
                        <div style={{ textAlign:"right" }}>
                          <div style={{ fontWeight:700,color:cat.color }}>{fmtRp(cat.total)}</div>
                          {budget>0 && <div style={{ fontSize:12,color:"#888" }}>{((cat.total/budget)*100).toFixed(1)}% anggaran</div>}
                        </div>
                      </div>
                      <div style={{ height:4,background:"#ffffff0a",borderRadius:99,overflow:"hidden" }}>
                        <div className="progress-anim" style={{ height:"100%",borderRadius:99,width:`${totalSpent>0?(cat.total/totalSpent)*100:0}%`,background:cat.color }} />
                      </div>
                    </div>
                  ))
                }

                {totalSpent>0 && (
                  <div style={{ background:"#1a1f2e",border:"1px solid #ffffff08",borderRadius:14,padding:"12px 14px",marginTop:8 }}>
                    <div style={{ display:"flex",justifyContent:"space-between",fontSize:13 }}>
                      <span style={{ color:"#888" }}>Total Pengeluaran</span>
                      <span style={{ fontWeight:800,color:"#f0f0f0" }}>{fmtRp(totalSpent)}</span>
                    </div>
                    {budget>0 && (
                      <div style={{ display:"flex",justifyContent:"space-between",fontSize:13,marginTop:6 }}>
                        <span style={{ color:"#888" }}>Sisa Anggaran</span>
                        <span style={{ fontWeight:800,color:remaining<0?"#ef4444":"#22c55e" }}>{fmtRp(remaining)}</span>
                      </div>
                    )}
                  </div>
                )}

                {/* ── Per Tanggal ── */}
                {(() => {
                  // Gabungkan semua transaksi bulan ini (direct + dari withdraw)
                  const allTxThisMonth = [
                    ...expenses.map(e=>({...e})),
                    ...withdrawals.flatMap(w=>w.expenses.map(e=>({...e})))
                  ];
                  // Group by date
                  const byDate = {};
                  allTxThisMonth.forEach(e => {
                    if(!byDate[e.date]) byDate[e.date] = { total:0, count:0 };
                    byDate[e.date].total += e.amount;
                    byDate[e.date].count += 1;
                  });
                  const dateRows = Object.entries(byDate).sort((a,b)=>a[0]<b[0]?1:-1);
                  const maxDay = dateRows.reduce((m,r)=>r[1].total>m?r[1].total:m, 0);
                  if(dateRows.length===0) return null;
                  return (
                    <div style={{ marginTop:24 }}>
                      <div style={{ fontWeight:800,fontSize:14,color:"#888",textTransform:"uppercase",letterSpacing:1,marginBottom:4 }}>📅 Pengeluaran per Tanggal</div>
                      <div style={{ fontSize:12,color:"#555",marginBottom:14 }}>Bulan {MONTHS_ID[mo-1]} {yr}</div>
                      {dateRows.map(([date,info])=>{
                        const pctDay = maxDay>0?(info.total/maxDay)*100:0;
                        return (
                          <div key={date} style={{ background:"#1a1f2e",border:"1px solid #ffffff08",borderRadius:14,padding:"10px 14px",marginBottom:8 }}>
                            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6 }}>
                              <div>
                                <div style={{ fontWeight:700,fontSize:13 }}>{fmtDateFull(date)}</div>
                                <div style={{ fontSize:11,color:"#666",marginTop:1 }}>{info.count} transaksi</div>
                              </div>
                              <div style={{ fontWeight:800,fontSize:14,color:"#f97316" }}>{fmtRp(info.total)}</div>
                            </div>
                            <div style={{ height:4,background:"#ffffff0a",borderRadius:99,overflow:"hidden" }}>
                              <div className="progress-anim" style={{ height:"100%",borderRadius:99,width:`${pctDay}%`,background:"#f97316" }} />
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })()}

                {/* ── Per Bulan (all time) ── */}
                {(() => {
                  // Kumpulkan semua bulan yang punya data dari SEMUA data
                  const monthTotals = {};
                  data.expenses.forEach(e => {
                    const mk2 = e.monthKey || (e.date ? e.date.slice(0,7) : null);
                    if(!mk2) return;
                    if(!monthTotals[mk2]) monthTotals[mk2] = { total:0, count:0 };
                    monthTotals[mk2].total += e.amount;
                    monthTotals[mk2].count += 1;
                  });
                  (data.withdrawals||[]).forEach(w => {
                    w.expenses.forEach(e => {
                      const mk2 = w.monthKey || (w.date ? w.date.slice(0,7) : null);
                      if(!mk2) return;
                      if(!monthTotals[mk2]) monthTotals[mk2] = { total:0, count:0 };
                      monthTotals[mk2].total += e.amount;
                      monthTotals[mk2].count += 1;
                    });
                  });
                  const monthRows = Object.entries(monthTotals).sort((a,b)=>a[0]<b[0]?1:-1);
                  const maxMo = monthRows.reduce((m,r)=>r[1].total>m?r[1].total:m, 0);
                  if(monthRows.length===0) return null;
                  return (
                    <div style={{ marginTop:24,marginBottom:16 }}>
                      <div style={{ fontWeight:800,fontSize:14,color:"#888",textTransform:"uppercase",letterSpacing:1,marginBottom:4 }}>📆 Pengeluaran per Bulan</div>
                      <div style={{ fontSize:12,color:"#555",marginBottom:14 }}>Riwayat semua bulan</div>
                      {monthRows.map(([mk2,info])=>{
                        const [y2,m2] = mk2.split("-");
                        const isCurrentMonth = mk2===mk;
                        const pctMo = maxMo>0?(info.total/maxMo)*100:0;
                        return (
                          <div key={mk2} style={{ background: isCurrentMonth?"#1e2638":"#1a1f2e", border:`1px solid ${isCurrentMonth?"#3b82f640":"#ffffff08"}`, borderRadius:14, padding:"10px 14px", marginBottom:8 }}>
                            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6 }}>
                              <div>
                                <div style={{ display:"flex",alignItems:"center",gap:6 }}>
                                  <span style={{ fontWeight:700,fontSize:13 }}>{MONTHS_ID[parseInt(m2)-1]} {y2}</span>
                                  {isCurrentMonth && <span style={{ fontSize:10,background:"#3b82f620",color:"#3b82f6",borderRadius:5,padding:"1px 6px",fontWeight:700 }}>Bulan ini</span>}
                                </div>
                                <div style={{ fontSize:11,color:"#666",marginTop:1 }}>{info.count} transaksi</div>
                              </div>
                              <div style={{ fontWeight:800,fontSize:14,color:"#3b82f6" }}>{fmtRp(info.total)}</div>
                            </div>
                            <div style={{ height:4,background:"#ffffff0a",borderRadius:99,overflow:"hidden" }}>
                              <div className="progress-anim" style={{ height:"100%",borderRadius:99,width:`${pctMo}%`,background: isCurrentMonth?"#3b82f6":"#6366f1" }} />
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })()}
              </div>
            )}
          </main>

          {/* ── FAB: hanya tombol + tambah pengeluaran ── */}
          <button className="fab" onClick={()=>setShowExp(true)}>+</button>

          {/* ── Modals ── */}

          {showBudget && (
            <Modal title="Set Anggaran Bulan Ini" onClose={()=>setShowBudget(false)}>
              <div style={{ marginBottom:16 }}>
                <label style={{ display:"block",fontSize:12,color:"#888",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6 }}>Anggaran ({MONTHS_ID[mo-1]} {yr})</label>
                <input className="app-input" type="text" placeholder="Contoh: 3000000" value={budgetInput}
                  onChange={e=>setBudgetInput(e.target.value.replace(/\D/g,""))}
                  onKeyDown={e=>e.key==="Enter"&&saveBudget()} autoFocus />
                {budgetInput && <div style={{ fontSize:13,color:"#22c55e",marginTop:5,fontWeight:700 }}>{fmtRp(budgetInput)}</div>}
              </div>
              <button className="btn-primary" onClick={saveBudget}>Simpan Anggaran</button>
            </Modal>
          )}

          {showWithdraw && (
            <Modal title="💵 Tarik Uang dari Anggaran" onClose={()=>setShowWithdraw(false)}>
              <div style={{ background:"#f59e0b12",border:"1.5px solid #f59e0b30",borderRadius:12,padding:12,marginBottom:16,fontSize:13,color:"#f59e0b" }}>
                💡 Uang ditarik dari anggaran. Catat pengeluaran dari uang tunai ini nanti di tab Tarik Uang.
              </div>
              <div style={{ marginBottom:16 }}>
                <label style={{ display:"block",fontSize:12,color:"#888",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6 }}>Label (opsional)</label>
                <input className="app-input" placeholder="Contoh: Belanja mingguan..." value={wdForm.label}
                  onChange={e=>setWdForm(f=>({...f,label:e.target.value}))} autoFocus />
              </div>
              <div style={{ marginBottom:16 }}>
                <label style={{ display:"block",fontSize:12,color:"#888",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6 }}>Jumlah (Rp)</label>
                <input className="app-input" type="text" placeholder="Contoh: 500000" value={wdForm.amount}
                  onChange={e=>setWdForm(f=>({...f,amount:e.target.value.replace(/\D/g,"")}))} />
                {wdForm.amount && <div style={{ fontSize:13,color:"#f59e0b",marginTop:5,fontWeight:700 }}>{fmtRp(wdForm.amount)}</div>}
              </div>
              <div style={{ marginBottom:16 }}>
                <label style={{ display:"block",fontSize:12,color:"#888",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6 }}>Tanggal Penarikan</label>
                <input className="app-input" type="date" value={wdForm.date}
                  onChange={e=>setWdForm(f=>({...f,date:e.target.value}))} />
                {wdForm.date && <div style={{ fontSize:12,color:"#888",marginTop:5 }}>{fmtDateFull(wdForm.date)}</div>}
              </div>
              <button className="btn-withdraw" onClick={addWithdraw}>💵 Tarik Uang</button>
            </Modal>
          )}

          {showWExp && activeW && (
            <Modal title="Tambah Pengeluaran dari Tunai" onClose={()=>setShowWExp(null)}>
              {(() => {
                const spent=activeW.expenses.reduce((s,e)=>s+e.amount,0);
                const sisa=activeW.amount-spent;
                return (
                  <div style={{ background:"#f59e0b12",border:"1.5px solid #f59e0b30",borderRadius:12,padding:10,marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center" }}>
                    <div>
                      <div style={{ fontSize:12,color:"#888" }}>Dari: {activeW.label}</div>
                      <div style={{ fontSize:11,color:"#666" }}>{fmtDateShort(activeW.date)}</div>
                    </div>
                    <div style={{ textAlign:"right" }}>
                      <div style={{ fontSize:11,color:"#888" }}>Sisa tunai</div>
                      <div style={{ fontWeight:800,color:sisa<=0?"#ef4444":"#f59e0b" }}>{fmtRp(sisa)}</div>
                    </div>
                  </div>
                );
              })()}
              <ExpenseForm form={wExpForm} setForm={setWExpForm} onSubmit={addWExpense} btnLabel="Tambah Pengeluaran" />
            </Modal>
          )}

          {showExp && (
            <Modal title="Tambah Pengeluaran Langsung" onClose={()=>setShowExp(false)}>
              <ExpenseForm form={expForm} setForm={setExpForm} onSubmit={addExpense} btnLabel="Tambah Pengeluaran" />
            </Modal>
          )}

          {deleteId && (
            <Modal title="Hapus Transaksi?" onClose={()=>setDeleteId(null)}>
              <p style={{ color:"#888",marginBottom:20 }}>Transaksi ini akan dihapus permanen.</p>
              <div style={{ display:"flex",gap:10 }}>
                <button className="btn-ghost" style={{ flex:1 }} onClick={()=>setDeleteId(null)}>Batal</button>
                <button className="btn-danger" onClick={()=>deleteExpense(deleteId)}>Hapus</button>
              </div>
            </Modal>
          )}

          {deleteWId && (
            <Modal title="Hapus Penarikan?" onClose={()=>setDeleteWId(null)}>
              <p style={{ color:"#888",marginBottom:20 }}>Penarikan + semua pengeluaran di dalamnya akan dihapus permanen.</p>
              <div style={{ display:"flex",gap:10 }}>
                <button className="btn-ghost" style={{ flex:1 }} onClick={()=>setDeleteWId(null)}>Batal</button>
                <button className="btn-danger" onClick={()=>deleteWithdraw(deleteWId)}>Hapus</button>
              </div>
            </Modal>
          )}

          {showReset && (
            <Modal title="🗑 Reset Semua Data?" onClose={()=>setShowReset(false)}>
              <div style={{ background:"#ef444412",border:"1.5px solid #ef444430",borderRadius:12,padding:14,marginBottom:20,fontSize:13,color:"#ef4444",lineHeight:1.7 }}>
                ⚠️ Semua data anggaran, transaksi, dan penarikan akan <strong>dihapus permanen</strong>.<br/>
                Pastikan sudah Export dulu jika ingin backup!
              </div>
              <div style={{ display:"flex",gap:10 }}>
                <button className="btn-ghost" style={{ flex:1 }} onClick={()=>setShowReset(false)}>Batal</button>
                <button className="btn-danger" onClick={resetData}>Hapus Semua Data</button>
              </div>
            </Modal>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
